name: First Ci Workflow

on:
    push:  # whenever any new code will push it will triger
        
jobs:
    build:  # Name of Job
        runs-on: ubuntu-latest # GitHub Runner (Free)
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4 # clone the code into a ubuntu runner

            - name: Setup Docker
              uses: docker/setup-buildx-action@v4